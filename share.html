<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#141414" />
  <title>Party invite — Better Nights</title>
  <meta name="description" content="Open Better Nights to join this party with your invite code." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #1a1430 0%, #141414 45%, #0f172a 100%);
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .card {
      background: rgba(36, 36, 36, 0.95);
      border-radius: 18px;
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }
    h1 {
      font-size: 1.35rem;
      margin-bottom: 0.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    p.lead {
      color: #b8c5d6;
      line-height: 1.55;
      margin-bottom: 1.25rem;
      font-size: 0.95rem;
    }
    .code {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: #89f0b7;
      background: rgba(0,0,0,0.35);
      padding: 0.75rem 1rem;
      border-radius: 12px;
      margin: 1rem 0;
      word-break: break-all;
    }
    .btn {
      display: block;
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 0.9rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.65rem;
      text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #a78bfa, #c4b5fd);
      color: #0d1117;
    }
    .btn-secondary {
      background: transparent;
      color: #eee;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .hint {
      font-size: 0.8rem;
      color: #8b949e;
      margin-top: 1rem;
      line-height: 1.45;
    }
    .err { color: #f85149; font-size: 0.9rem; margin-top: 0.75rem; }
    input#hiddenCode {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're invited to a party</h1>
    <p class="lead">Open Better Nights to join. If the app doesn’t open automatically, use the buttons below.</p>
    <p id="err" class="err" hidden></p>
    <div id="codeWrap" hidden>
      <div class="code" id="codeDisplay"></div>
      <input type="text" id="hiddenCode" readonly tabindex="-1" autocomplete="off" aria-hidden="true" />
    </div>
    <button type="button" class="btn btn-primary" id="openApp">Open in app</button>
    <button type="button" class="btn btn-secondary" id="copyLink">Copy invite link</button>
    <button type="button" class="btn btn-secondary" id="openHere">Open app &amp; mark I’m here</button>
    <p class="hint" id="hint"></p>
    <p class="hint">Install Better Nights from the App Store, add your phone in the app, then open this link again.</p>
  </div>
  <script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var raw = (params.get('invite') || params.get('code') || '').trim();
  if (!raw) {
    var parts = window.location.pathname.split('/').filter(Boolean);
    var last = parts[parts.length - 1] || '';
    if (last && !/\.html?$/i.test(last)) {
      raw = last.replace(/\.html?$/i, '');
    }
  }
  var code = raw.toUpperCase().replace(/[^A-Z0-9]/g, '');
  var errEl = document.getElementById('err');
  var hintEl = document.getElementById('hint');
  var origin = 'https://betternights.app';
  var universal = origin + '/share.html?invite=' + encodeURIComponent(code);

  function showErr(msg) {
    errEl.textContent = msg;
    errEl.hidden = false;
  }

  if (!code || code.length < 4) {
    showErr('This link is missing an invite code. Ask the host for a full invite link with ?invite=CODE.');
    document.getElementById('openApp').disabled = true;
    document.getElementById('copyLink').disabled = true;
    document.getElementById('openHere').disabled = true;
    return;
  }

  document.getElementById('codeWrap').hidden = false;
  document.getElementById('codeDisplay').textContent = code;
  document.getElementById('hiddenCode').value = code;

  var schemes = [
    'betternights://invite?invite=' + encodeURIComponent(code)
  ];
  var schemesHere = [
    'betternights://invite?invite=' + encodeURIComponent(code) + '&action=imhere'
  ];

  function tryOpen(list) {
    if (!list.length) return;
    window.location.href = list[0];
    if (list.length < 2) return;
    setTimeout(function () {
      if (document.visibilityState === 'visible') {
        window.location.href = list[1];
      }
    }, 650);
  }

  document.getElementById('openApp').addEventListener('click', function () {
    hintEl.textContent = 'If nothing opens, install the app and try again.';
    tryOpen(schemes);
  });

  document.getElementById('openHere').addEventListener('click', function () {
    hintEl.textContent = 'Opens the app and marks you as arrived.';
    tryOpen(schemesHere);
  });

  document.getElementById('copyLink').addEventListener('click', function () {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(universal).then(function () {
        hintEl.textContent = 'Link copied. Send it in Messages or any app.';
      }).catch(function () {
        hintEl.textContent = universal;
      });
    } else {
      hintEl.textContent = universal;
    }
  });

  if (params.get('autopen') === '1' || params.get('autopen') === 'true') {
    hintEl.textContent = 'Opening app…';
    tryOpen(schemes);
  }
})();
  </script>
</body>
</html>
