<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Party Invite | Safely Sip - Better Nights</title>
  <meta name="description" content="You're invited to a party on Safely Sip. Open the app to join.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }
    p {
      color: #b8c5d6;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .cta {
      display: inline-block;
      background: #6366f1;
      color: white;
      text-decoration: none;
      padding: 0.875rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .cta:hover {
      background: #4f46e5;
    }
    .invite-code {
      font-family: monospace;
      background: rgba(0,0,0,0.3);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      margin: 1rem 0;
      font-size: 0.95rem;
    }
    .app-store-badge {
      margin-top: 2rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're invited to a party</h1>
    <p>Your friend shared a Safely Sip party invite with you. Open the app to view details and join the gathering.</p>
    <p id="invite-display" class="invite-code" style="display: none;"></p>
    <a href="https://betternights.github.io" class="cta" id="app-link">Learn more about Safely Sip</a>
    <p style="font-size: 0.875rem; margin-top: 1rem;">Download Safely Sip from the App Store to join the party.</p>
  </div>

  <script>
    (function() {
      // Support both ?invite=CODE and /party/CODE (via 404.html redirect) or hash #CODE
      var params = new URLSearchParams(window.location.search);
      var hash = window.location.hash ? window.location.hash.slice(1) : '';
      var pathParts = window.location.pathname.split('/').filter(Boolean);

      var inviteCode = params.get('invite') || hash || (pathParts[pathParts.length - 1] !== 'party' && pathParts[pathParts.length - 1] ? pathParts[pathParts.length - 1] : null);

      if (inviteCode) {
        var el = document.getElementById('invite-display');
        el.textContent = 'Invite code: ' + inviteCode;
        el.style.display = 'block';

        // When app is on App Store, update: appLink.href = 'https://apps.apple.com/app/safely-sip/idYOUR_APP_ID';
      }
    })();
  </script>
</body>
</html>
